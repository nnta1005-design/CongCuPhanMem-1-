name: CI/CD Docker

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Debug (kiểm tra secret có tồn tại không)
      - name: Debug Docker Username
        run: echo "Username is set"
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

      # 3. Login Docker Hub
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4. Build & Push (gộp luôn - chuẩn hơn)
      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/congcu:latest
            ${{ secrets.DOCKER_USERNAME }}/congcu:${{ github.sha }}
